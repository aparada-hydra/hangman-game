<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 🕹️Aldos Hangman Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #764ba2;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .hint {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-style: italic;
        }
        
        .word-display {
            text-align: center;
            font-size: 2.5em;
            letter-spacing: 10px;
            margin: 30px 0;
            color: #333;
            font-weight: bold;
        }
        
        .hangman-drawing {
            text-align: center;
            font-family: monospace;
            font-size: 1.2em;
            line-height: 1.2;
            margin: 20px 0;
            min-height: 150px;
            color: #333;
            white-space: pre;
        }
        
        .chances {
            text-align: center;
            font-size: 1.1em;
            color: #e74c3c;
            margin-bottom: 20px;
        }
        
        .keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 20px;
        }
        
        .key {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 5px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        
        .key:hover:not(:disabled) {
            background: #764ba2;
            transform: scale(1.05);
        }
        
        .key:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .key.correct {
            background: #27ae60;
        }
        
        .key.wrong {
            background: #e74c3c;
        }
        
        .message {
            text-align: center;
            font-size: 1.3em;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .message.win {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .message.lose {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .new-game-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }
        
        .new-game-btn.show {
            display: block;
        }
        
        .guessed-letters {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 0.9em;
        }
        
        @media (max-width: 400px) {
            .keyboard {
                grid-template-columns: repeat(5, 1fr);
            }
            .word-display {
                font-size: 2em;
                letter-spacing: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1> <div class="tenor-gif-embed" data-postid="7232725154092760048" data-share-method="host" data-aspect-ratio="0.963855" 
                data-width="100%"><a href="https://tenor.com/view/hmm-gif-7232725154092760048">Hmm Sticker</a>from <a href="https://tenor.com/search/hmm-stickers">Hmm Stickers</a></div> 
                        <script type="text/javascript" async src="https://tenor.com/embed.js">
                        </script> Want A Challenge?</h1>
        <p class="hint">HINT: Its an animal, careful some are rare!!</p>
        
        <div class="hangman-drawing" id="hangman"></div>
        
        <div class="chances">Chances remaining: <span id="chances">7</span></div>
        
        <div class="word-display" id="wordDisplay"></div>
        
        <div class="message" id="message"></div>
        
        <div class="keyboard" id="keyboard"></div>
        
        <div class="guessed-letters" id="guessedLetters"></div>
        
        <button class="new-game-btn" id="newGameBtn" onclick="initGame()"> 🎲 New Game... No? Why Not?</button>
    </div>

    <script>
        const words = ['python ', 'bumblebee ', 'okapi', 'axolotl', 'platypus', 'marwhal',
                        'armadillo', 'kangaroo', 'echidna', 'iguana', 'falcon', 'raccoon', 'tyrannosaurus',
                        'lizard', 'baboon', 'bobcat', 'penguin', 'rooster', 'boa', 'snake', 'vulture', 'liger', 'unicorn'];
        
        const hangmanStages = [
            `
  +---+
  |   |
      |
      |
      |
      |
=========`,
            `
  +---+
  |   |
  O   |
      |
      |
      |
=========`,
            `
  +---+
  |   |
  O   |
  |   |
      |
      |
=========`,
            `
  +---+
  |   |
  O   |
 /|   |
      |
      |
=========`,
            `
  +---+
  |   |
  O   |
 /|\  |
      |
      |
=========`,
            `
  +---+
  |   |
  O   |
 /|\  |
 /    |
      |
=========`,
            `
  +---+
  |   |
  O   |
 /|\  |
 / \  |
      |
=========`
        ];
        
        let currentWord = '';
        let guessedLetters = [];
        let wrongGuesses = 0;
        let maxWrong = 6;
        let gameOver = false;
        
        function initGame() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            guessedLetters = [];
            wrongGuesses = 0;
            gameOver = false;
            
            document.getElementById('message').className = 'message';
            document.getElementById('newGameBtn').classList.remove('show');
            document.getElementById('chances').textContent = maxWrong - wrongGuesses + 1;
            document.getElementById('guessedLetters').textContent = '';
            
            createKeyboard();
            updateDisplay();
        }
        
        function createKeyboard() {
            const keyboard = document.getElementById('keyboard');
            keyboard.innerHTML = '';
            
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.textContent = letter;
                btn.onclick = () => guessLetter(letter.toLowerCase());
                btn.id = `key-${letter.toLowerCase()}`;
                keyboard.appendChild(btn);
            }
        }
        
        function updateDisplay() {
            const display = currentWord.split('').map(letter => 
                guessedLetters.includes(letter) ? letter.toUpperCase() : '_'
            ).join(' ');
            
            document.getElementById('wordDisplay').textContent = display;
            document.getElementById('hangman').textContent = hangmanStages[wrongGuesses];
            document.getElementById('chances').textContent = maxWrong - wrongGuesses + 1;
            
            // Update guessed letters display
            const wrongLetters = guessedLetters.filter(l => !currentWord.includes(l));
            if (wrongLetters.length > 0) {
                document.getElementById('guessedLetters').textContent = 
                    'Wrong guesses: ' + wrongLetters.join(', ').toUpperCase();
            }
        }
        
        function guessLetter(letter) {
            if (gameOver || guessedLetters.includes(letter)) return;
            
            guessedLetters.push(letter);
            const btn = document.getElementById(`key-${letter}`);
            btn.disabled = true;
            
            if (currentWord.includes(letter)) {
                btn.classList.add('correct');
                checkWin();
            } else {
                btn.classList.add('wrong');
                wrongGuesses++;
                checkLoss();
            }
            
            updateDisplay();
        }
        
        function checkWin() {
            const wordLetters = [...new Set(currentWord.split(''))];
            const allGuessed = wordLetters.every(letter => guessedLetters.includes(letter));
            
            if (allGuessed) {
                gameOver = true;
                document.getElementById('message').textContent = 
                    `🏆 You won wowwwwwww! The word was: ${currentWord.toUpperCase()}`;
                document.getElementById('message').className = 'message win';
                document.getElementById('newGameBtn').classList.add('show');
                disableAllKeys();
            }
        }
        
        function checkLoss() {
            if (wrongGuesses > maxWrong) {
                gameOver = true;
                document.getElementById('message').textContent = 
                    `😑 ehhh try again! The word was: ${currentWord.toUpperCase()}`;
                document.getElementById('message').className = 'message lose';
                document.getElementById('newGameBtn').classList.add('show');
                disableAllKeys();
                
                // Reveal the word
                document.getElementById('wordDisplay').textContent = 
                    currentWord.toUpperCase().split('').join(' ');
            }
        }
        
        function disableAllKeys() {
            document.querySelectorAll('.key').forEach(key => key.disabled = true);
        }
        
        // Initialize game on load
        initGame();
    </script>
</body>
</html>
